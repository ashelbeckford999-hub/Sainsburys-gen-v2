<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ashe's Sainsburys Barcode Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;
background:#050505;color:#fff;
background-image:
linear-gradient(rgba(0,255,120,.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,255,120,.05) 1px,transparent 1px),
radial-gradient(circle at center,rgba(0,255,120,.18),transparent 70%);
background-size:36px 36px,36px 36px,100% 100%;
}
.container{
width:650px;background:#090909;border:1px solid #00ff99;border-radius:24px;padding:40px;
box-shadow:0 0 20px #00ff99,0 0 60px rgba(0,255,120,.45),inset 0 0 12px rgba(0,255,120,.15);
}
h1{font-family:Orbitron,sans-serif;text-align:center;color:#00ff99;font-size:46px;
text-shadow:0 0 10px #00ff99,0 0 30px #00ff99}
.small{text-align:center;color:#9cffcf;margin:10px 0 30px;font-size:12px;letter-spacing:2px}
input,button{width:100%;height:54px;border-radius:12px;margin:12px 0;font-size:16px}
input{background:#111;border:1px solid #00ff99;color:#fff;padding:0 16px}
button{border:none;background:linear-gradient(90deg,#00ff88,#65ffd6);font-weight:bold;font-size:22px;cursor:pointer}
canvas{width:100%;margin-top:20px;background:#fff;border-radius:10px}
</style>
</head>
<body>
<div class="container">
<h1>Ashel's BARCODE GEN</h1>
<div class="small">© 2026 ASHEL. ALL RIGHTS RESERVED.</div>
<input placeholder="Product Name">
<input placeholder="EAN-13">
<input placeholder="Price (0.15, 1.00, etc.)">
<button>Generate Barcode</button>
<canvas height="180"></canvas>
</div>
</body>
</html>
