<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashel's Barcode Gen</title>
    <!-- Built-in high compatibility script -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, sans-serif;
        }

        body {
            background-color: #050b07;
            background-image: 
                linear-gradient(rgba(0, 255, 127, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 127, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: #0b0f0c;
            border: 2px solid #00ff7f;
            border-radius: 16px;
            width: 100%;
            max-width: 520px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.2);
        }

        h1 {
            color: #00ff7f;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 127, 0.6);
            margin-bottom: 4px;
        }

        .copyright {
            color: rgba(0, 255, 127, 0.5);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        input[type="text"] {
            width: 100%;
            background-color: #070a08;
            border: 1px solid rgba(0, 255, 127, 0.4);
            border-radius: 8px;
            padding: 14px 16px;
            color: #00ff7f;
            font-size: 13px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #00ff7f;
            box-shadow: 0 0 8px rgba(0, 255, 127, 0.3);
        }

        input::placeholder {
            color: rgba(0, 255, 127, 0.35);
        }

        button {
            width: 100%;
            background-color: #1cfc94;
            border: none;
            border-radius: 8px;
            padding: 14px;
            color: #050b07;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 0 15px rgba(28, 252, 148, 0.4);
        }

        button:hover {
            background-color: #00ff7f;
            box-shadow: 0 0 25px rgba(0, 255, 127, 0.7);
        }

        .barcode-output {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        svg {
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            display: none;
            max-width: 100%;
            height: auto;
        }

        .download-link {
            display: none;
            color: #00ff7f;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border: 1px dashed #00ff7f;
            padding: 10px 20px;
            border-radius: 6px;
            text-shadow: 0 0 5px rgba(0, 255, 127, 0.5);
            cursor: pointer;
        }

        .download-link:hover {
            background-color: rgba(0, 255, 127, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 127, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ashel's Barcode Gen</h1>
        <div class="copyright">© 2026 Ashel. All Rights Reserved.</div>
        
        <form id="barcodeForm" onsubmit="generateBarcode(event)">
            <div class="form-group">
                <input type="text" id="prodName" placeholder="Product Name" required>
            </div>
            
            <div class="form-group">
                <input type="text" id="barcodeData" placeholder="Barcode Text or Numbers" required>
            </div>
            
            <div class="form-group">
                <input type="text" id="price" placeholder="Price (0.15, 1.00, etc.)" required>
            </div>
            
            <button type="submit" id="generateBtn">Generate Barcode</button>
        </form>

        <div class="barcode-output">
            <!-- Swapped canvas out for SVG element to allow cross-origin friendly data building -->
            <svg id="barcodeSvg"></svg>
            <a id="downloadBtn" class="download-link">Download Barcode Asset</a>
        </div>
    </div>

    <script>
        function generateBarcode(event) {
            event.preventDefault();

            const name = document.getElementById('prodName').value.trim();
            const dataInput = document.getElementById('barcodeData').value.trim();
            const priceVal = document.getElementById('price').value.trim();
            
            const svgElement = document.getElementById('barcodeSvg');
            const downloadBtn = document.getElementById('downloadBtn');

            try {
                // Renders clean scale-independent vector math onto the markup tree
                JsBarcode(svgElement, dataInput, {
                    format: "CODE128",
                    text: `${name} | $${priceVal}`, 
                    font: "monospace",
                    fontSize: 15,
                    textMargin: 8,
                    width: 2,
                    height: 75,
                    displayValue: true
                });

                svgElement.style.display = "block";
                
                // Formats elements into raw text structure strings
                const svgSerializer = new XMLSerializer();
                let svgString = svgSerializer.serializeToString(svgElement);
                
                // Pack string directly into a local hardware binary object bypass block
                const svgBlob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
                const blobUrl = URL.createObjectURL(svgBlob);
                
                // Assign local address mappings
                downloadBtn.href = blobUrl;
                
                const formattedName = name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                downloadBtn.download = `barcode_${formattedName}.svg`;
                downloadBtn.style.display = "inline-block";

            } catch (error) {
                alert("Generation Error: Visual asset construction halted.");
                svgElement.style.display = "none";
                downloadBtn.style.display = "none";
            }
        }
    </script>
</body>
</html>
