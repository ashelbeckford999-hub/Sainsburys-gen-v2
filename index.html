<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Ashel Barcode Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Orbitron,sans-serif;

background:#050b07;

color:#00ff88;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow-x:hidden;

position:relative;

padding:40px;

}

body::before{

content:"";

position:fixed;

inset:0;

background:

linear-gradient(rgba(0,255,120,.06) 1px,transparent 1px),

linear-gradient(90deg,
rgba(0,255,120,.06) 1px,
transparent 1px);

background-size:40px 40px;

animation:gridMove 14s linear infinite;

z-index:-2;

}

@keyframes gridMove{

from{

transform:translate(0,0);

}

to{

transform:translate(40px,40px);

}

}

body::after{

content:"";

position:fixed;

left:50%;

top:50%;

transform:translate(-50%,-50%);

width:900px;

height:900px;

background:

radial-gradient(circle,
rgba(0,255,120,.18),
transparent 70%);

filter:blur(60px);

z-index:-3;

}

.container{

width:760px;

max-width:95%;

background:rgba(8,8,8,.9);

border:2px solid #00ff88;

border-radius:28px;

padding:40px;

box-shadow:

0 0 20px #00ff88,

0 0 80px rgba(0,255,120,.2);

backdrop-filter:blur(10px);

}

h1{

font-size:42px;

text-align:center;

margin-bottom:10px;

text-shadow:

0 0 12px #00ff88,

0 0 35px #00ff88;

}

.subtitle{

text-align:center;

opacity:.7;

margin-bottom:35px;

}

input{

width:100%;

padding:16px;

margin-top:15px;

background:#0d1110;

border:1px solid #00ff88;

border-radius:10px;

font-size:16px;

color:#00ff88;

}

input:focus{

outline:none;

box-shadow:

0 0 15px #00ff88;

}

button{

width:100%;

padding:16px;

margin-top:18px;

border:none;

border-radius:12px;

background:#00ff88;

color:black;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:translateY(-3px);

box-shadow:

0 0 25px #00ff88;

}

canvas{

margin-top:30px;

background:white;

padding:15px;

border-radius:10px;

width:100%;

}

</style>

</head>

<body>
     

 <div class="container">

<h1>ASHEL</h1>

<div class="subtitle">
SAINSBURY'S BARCODE GENERATOR
</div>

<input
type="text"
id="productName"
placeholder="Product Name">

<input
type="text"
id="productCode"
placeholder="Original Product Barcode"
maxlength="13"
inputmode="numeric"
oninput="this.value=this.value.replace(/\D/g,'').slice(0,13)">

<input
type="number"
id="price"
placeholder="Price (100 = £1.00)"
min="30"
max="9999">

<button onclick="generateBarcode()">
GENERATE BARCODE
</button>

<canvas id="barcodeCanvas"></canvas>

<div style="margin-top:25px;display:flex;gap:15px;">

<button
id="downloadButton"
style="flex:1;"
type="button">

DOWNLOAD PNG

</button>

<button
style="flex:1;"
onclick="changeTheme()">

CHANGE THEME

</button>

</div>

<div
style="
margin-top:25px;
opacity:.7;
font-size:12px;
letter-spacing:2px;
text-align:center;">

© ASHEL BARCODE GENERATOR

</div>

</div>

  <script>
/* ===========================
   BARCODE GENERATOR
=========================== */

const canvas = document.getElementById("barcodeCanvas");
const downloadButton = document.getElementById("downloadButton");

function padLeft(value, length){
    return value.toString().padStart(length,"0");
}

function calculateCheckDigit(input){

    let sum = 0;

    for(let i=0;i<input.length;i++){

        const digit = parseInt(input[input.length-1-i],10);

        const weight = (i % 2 === 0) ? 3 : 1;

        sum += digit * weight;
    }

    let check = (10 - (sum % 10)) % 10;

    // Keep your custom odd-number rule
    if(check % 2 === 0){
        check = (check + 1) % 10;
    }

    return check;
}

function generateBarcode(){

    const barcode =
        document.getElementById("productCode")
        .value
        .replace(/\D/g,"");

    const price =
        parseInt(document.getElementById("price").value);

    if(barcode.length !== 13){

        alert("Please enter a valid 13 digit barcode.");

        return;
    }

    if(isNaN(price) || price < 30 || price > 9999){

        alert("Price must be between 30 and 9999.");

        return;
    }

    const paddedPrice = padLeft(price,6);

    const base =
        "91" +
        barcode +
        paddedPrice;

    const check =
        calculateCheckDigit(base);

    const finalBarcode =
        base + check;

    canvas.width = 720;
    canvas.height = 220;

    JsBarcode(canvas, finalBarcode,{

        format:"CODE128",

        displayValue:true,

        font:"monospace",

        fontSize:20,

        lineColor:"#000",

        background:"#fff",

        width:2.2,

        height:110,

        margin:15

    });

    const ctx = canvas.getContext("2d");

    ctx.fillStyle="#000";

    ctx.font="16px Arial";

    ctx.textAlign="center";

    ctx.fillText(

        document.getElementById("productName").value ||

        "ASHEL BARCODE",

        canvas.width/2,

        195

    );

}

downloadButton.onclick = function(){

    const link = document.createElement("a");

    link.download = "barcode.png";

    link.href = canvas.toDataURL("image/png");

    link.click();

};

/* ===========================
   THEMES
=========================== */

const themes = [

{
bg:"#050b07",
card:"rgba(8,8,8,.90)",
border:"#00ff88",
text:"#00ff88"
},

{
bg:"#101010",
card:"#1a1a1a",
border:"#00d9ff",
text:"#00d9ff"
},

{
bg:"#120000",
card:"#220000",
border:"#ff4444",
text:"#ff6666"
},

{
bg:"#ffffff",
card:"#f4f4f4",
border:"#222222",
text:"#111111"
}

];

let currentTheme = 0;

function applyTheme(theme){

    document.body.style.background = theme.bg;

    document.body.style.color = theme.text;

    const card = document.querySelector(".container");

    card.style.background = theme.card;

    card.style.borderColor = theme.border;

    card.style.color = theme.text;

}

function changeTheme(){

    currentTheme++;

    if(currentTheme >= themes.length){

        currentTheme = 0;

    }

    applyTheme(themes[currentTheme]);

}

applyTheme(themes[0]);
</script>
  </body>
</html>
