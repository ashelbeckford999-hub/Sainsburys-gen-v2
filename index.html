<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashel's Barcode Gen</title>
    <!-- JsBarcode library dependency included via secure CDN for rendering standard barcodes -->
    <script src="https://jsdelivr.net"></script>
    <style>
        /* Base Reset & Grid Background */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, sans-serif;
        }

        body {
            background-color: #050b07;
            background-image: 
                linear-gradient(rgba(0, 255, 127, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 127, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 40px 20px;
        }

        /* Central Glow Panel */
        .container {
            background-color: #0b0f0c;
            border: 2px solid #00ff7f;
            border-radius: 16px;
            width: 100%;
            max-width: 520px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 
                0 0 20px rgba(0, 255, 127, 0.2),
                inset 0 0 15px rgba(0, 255, 127, 0.1);
            position: relative;
        }

        /* Neon Header Text */
        h1 {
            color: #00ff7f;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 127, 0.6);
            margin-bottom: 4px;
        }

        /* Subtitle / Copyright styling */
        .copyright {
            color: rgba(0, 255, 127, 0.5);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        /* Input Form Grouping */
        .form-group {
            margin-bottom: 16px;
        }

        /* Cyberpunk Input Boxes */
        input[type="text"] {
            width: 100%;
            background-color: #070a08;
            border: 1px solid rgba(0, 255, 127, 0.4);
            border-radius: 8px;
            padding: 14px 16px;
            color: #00ff7f;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #00ff7f;
            box-shadow: 0 0 8px rgba(0, 255, 127, 0.3);
        }

        /* Input Placeholders matching your image */
        input::placeholder {
            color: rgba(0, 255, 127, 0.35);
        }

        /* High-luminance Solid Button */
        button {
            width: 100%;
            background-color: #1cfc94;
            border: none;
            border-radius: 8px;
            padding: 14px;
            color: #050b07;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(28, 252, 148, 0.4);
        }

        button:hover {
            background-color: #00ff7f;
            box-shadow: 0 0 25px rgba(0, 255, 127, 0.7);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Dynamic barcode output box space */
        .barcode-output {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        canvas {
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            display: none; /* Hidden until barcode successfully generated */
            max-width: 100%;
        }

        /* Dynamic Glow Download Link */
        .download-link {
            display: none; /* Hidden until content is loaded */
            color: #00ff7f;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 0.5px;
            border: 1px dashed #00ff7f;
            padding: 10px 20px;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(0, 255, 127, 0.5);
        }

        .download-link:hover {
            background-color: rgba(0, 255, 127, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 127, 0.3);
            text-shadow: 0 0 8px rgba(0, 255, 127, 0.8);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ashel's Barcode Gen</h1>
        <div class="copyright">© 2026 Ashel. All Rights Reserved.</div>
        
        <form id="barcodeForm" onsubmit="generateBarcode(event)">
            <div class="form-group">
                <input type="text" id="prodName" placeholder="Product Name" required>
            </div>
            
            <div class="form-group">
                <input type="text" id="eanCode" placeholder="EAN-13" required>
            </div>
            
            <div class="form-group">
                <input type="text" id="price" placeholder="Price (0.15, 1.00, etc.)" required>
            </div>
            
            <button type="submit" id="generateBtn">Generate Barcode</button>
        </form>

        <div class="barcode-output">
            <canvas id="barcodeCanvas"></canvas>
            <a id="downloadBtn" class="download-link" href="#" download="barcode.png">Download Barcode Asset</a>
        </div>
    </div>

    <script>
        function generateBarcode(event) {
            event.preventDefault();

            // Fetch current input values
            const name = document.getElementById('prodName').value.trim();
            const code = document.getElementById('eanCode').value.trim();
            const priceVal = document.getElementById('price').value.trim();
            
            const canvas = document.getElementById('barcodeCanvas');
            const downloadBtn = document.getElementById('downloadBtn');

            try {
                // Generate the barcode visual data via JsBarcode framework
                JsBarcode(canvas, code, {
                    format: "EAN13",
                    text: `${name} | $${priceVal}`, // Combined string displayed below lines
                    font: "monospace",
                    fontSize: 14,
                    textMargin: 8,
                    width: 2,
                    height: 70,
                    displayValue: true
                });

                // Display elements upon successful render pass
                canvas.style.display = "block";
                
                // Convert internal canvas rendering to clear, downloadable PNG URL asset
                const dataUrl = canvas.toDataURL("image/png");
                downloadBtn.href = dataUrl;
                
                // Format file download name layout cleanly
                const formattedName = name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                downloadBtn.download = `barcode_${formattedName}.png`;
                downloadBtn.style.display = "inline-block";

            } catch (error) {
                alert("Generation error: Please ensure your code is a valid 13-digit sequence for EAN-13 standards.");
                canvas.style.display = "none";
                downloadBtn.style.display = "none";
            }
        }
    </script>
</body>
</html>
